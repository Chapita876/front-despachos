name: CI/CD Front Despachos

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push de la imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/front-despachos:latest
          build-args: |
            VITE_API_VENTAS_URL=${{ secrets.VITE_API_VENTAS_URL }}
            VITE_API_DESPACHOS_URL=${{ secrets.VITE_API_DESPACHOS_URL }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Actualizar kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name EKS-Proyecto

      - name: Aplicar manifiestos de Kubernetes
        run: kubectl apply -f k8s/deployment.yaml

      - name: Forzar actualización de imagen y esperar rollout
        run: |
          kubectl rollout restart deployment/front-despachos
          kubectl rollout status deployment/front-despachos --timeout=120s